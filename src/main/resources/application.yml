spring:
  application:
    name: task-management-api

  datasource:
    url: jdbc:mysql://localhost:3306/task_management
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080